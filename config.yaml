---
  FOLDER_SCAN: "/path/to/scan/folder/"
  FOLDER_TOD_OUTPUT: "/path/to/tod/output/folder/"
  path_to_map: "/path/to/map/skymap.fits" # has I,Q,U maps

  # beam files setup
  FOLDER_BEAM: "/path/to/beam/folder/"
  beam_file_I: "beam_pixel_map_I.fits"
  beam_file_Q: "beam_pixel_map_Q.fits"
  beam_file_U: "beam_pixel_map_U.fits"
  power_fraction_threshold_I: 0.99 # threshold for including beam pixels in the convolution
  power_fraction_threshold_Q: 0.99
  power_fraction_threshold_U: 0.99

  start_day: 0
  end_day: 366
  # multipricessing parameters
  n_processes: 6
  max_memory_per_process: 1.5 # GB
  # calibration cache — set by the calibration run, skip it on subsequent runs
  # set calibration_skip: true to force using the cached values below
  calibration_skip: false
  calibration_n_processes: null
  calibration_batch_size: null
  # beam pixel cache — generated by precompute_beam_cache.py
  # set beam_cache_dir to the directory containing the .npz cache files to enable
  # beam_cache_n_psi must match the --n_psi value used when generating the cache
  beam_cache_dir: null
  beam_cache_n_psi: 720