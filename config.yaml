---
  FOLDER_SCAN: "/path/to/scan/folder/"
  FOLDER_TOD_OUTPUT: "/path/to/tod/output/folder/"
  path_to_map: "/path/to/map/skymap.fits" # has I,Q,U maps

  # beam files setup
  FOLDER_BEAM: "/path/to/beam/folder/"
  beam_file_I: "beam_pixel_map_I.fits"
  beam_file_Q: "beam_pixel_map_Q.fits"
  beam_file_U: "beam_pixel_map_U.fits"
  power_fraction_threshold_I: 0.99 # threshold for including beam pixels in the convolution
  power_fraction_threshold_Q: 0.99
  power_fraction_threshold_U: 0.99

  start_day: 0
  end_day: 366
  # multipricessing parameters
  n_processes: 6
  max_memory_per_process: 1.5 # GB
  # calibration cache — set by the calibration run, disabled on subsequent runs
  # set calibration_enabled: false to force using the cached values below
  calibration_enabled: true
  calibration_n_processes: null
  calibration_batch_size: null
  # beam grid interpolation method — choose one of:
  #   'nearest'  — single nearest-pixel lookup (fastest, no mixing between pixels)
  #   'bilinear' — 4-pixel bilinear HEALPix interpolation (default, fast Numba kernel)
  #   'gaussian' — isotropic Gaussian kernel (slowest, avoids grid-aligned artefacts)
  # sigma and radius are only used for 'gaussian' and default to 1× and 3× the
  # HEALPix pixel resolution respectively.
  beam_interp_method: 'bilinear'
  # beam pixel clustering — k-means on the unit sphere to reduce pixel count
  # before TOD generation.  Only the low-power tail is clustered; the main
  # lobe is kept pixel-exact.
  #
  # Quickstart:
  #   1. Set clustering_calibration_enabled: true and run once.
  #      The calibration sweeps a (tail_fraction × n_clusters) grid, selects
  #      the pair that maximises speedup while keeping B_ell divergence below
  #      clustering_error_threshold, saves the result, and resets the flag.
  #   2. On all subsequent runs the saved values are used directly.
  #
  # Manual override: set clustering_calibration_enabled: false and fill in
  #   n_beam_clusters and beam_cluster_tail_fraction by hand.
  # Disable entirely: set n_beam_clusters: null.
  n_beam_clusters: null               # int → enable; null → no clustering
  beam_cluster_tail_fraction: null    # fraction of beam power treated as tail
  clustering_calibration_enabled: false
  # Maximum tolerated relative RMS divergence in the beam transfer function
  # B_ell between the clustered and reference (unclustered) beam.  The
  # calibration picks the fastest (tail_fraction, n_clusters) pair whose
  # B_ell divergence does not exceed this value.
  clustering_error_threshold: 1.0e-5
  # Multiprocessing start method: 'spawn' (safe, default) or 'fork' (faster on Linux).
  # 'fork' avoids re-running Numba JIT compilation in each worker but may deadlock
  # on macOS. Only change this if you have verified it is safe on your platform.
  mp_start_method: 'spawn'